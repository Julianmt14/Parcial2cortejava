# Nombre y puerto de la aplicacion
spring.application.name=PARCIAL2CORTE
server.port=8081

# Base de datos H2 en memoria (no persiste entre arranques) - util para pruebas/parcial
spring.datasource.url=jdbc:h2:mem:parcial2corte;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web de H2 disponible en http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# ddl-auto=update -> crea/actualiza el esquema a partir de las entidades
spring.jpa.hibernate.ddl-auto=update
# Muestra el SQL generado en consola (util para entender que hace JPA)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Cierra el EntityManager al terminar la transaccion (mejor practica para REST)
spring.jpa.open-in-view=false

# JWT: secreto para firmar tokens (HS384 requiere >= 32 bytes) y minutos de vida
app.jwt.secret=cambia-este-secreto-por-uno-mas-seguro-de-32-bytes-min!
app.jwt.exp-minutes=60

# Logging
logging.level.org.springframework.security=INFO
